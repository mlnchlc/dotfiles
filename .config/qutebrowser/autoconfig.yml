# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  auto_save.session:
    global: true
  backend:
    global: webengine
  colors.webpage.bg:
    global: white
  colors.webpage.darkmode.enabled:
    global: true
  colors.webpage.preferred_color_scheme:
    global: dark
  content.autoplay:
    global: false
  content.blocking.method:
    global: both
  content.canvas_reading:
    global: false
  content.cookies.accept:
    '*://search.disroot.org/*': no-3rdparty
    global: never
  content.cookies.store:
    global: false
  content.headers.accept_language:
    global: en-US,en;q=0.5
  content.headers.custom:
    global:
      accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
  content.headers.do_not_track:
    global: true
  content.headers.user_agent:
    global: Mozilla/5.0 (Windows NT 10.0; rv:91.0) Gecko/20100101 Firefox/91.0
  content.javascript.enabled:
    '*://en.wikipedia.org/*': true
    '*://eu-browse.startpage.com/*': true
    '*://search.disroot.org/*': true
    '*://startpage.com/*': true
    '*://support.startpage.com/*': true
    '*://web.archive.org/*': true
    '*://www.startpage.com/*': true
    global: false
  content.user_stylesheets:
    global: ~/.config/qutebrowser/gruvbox-all-sites.css
  content.webgl:
    global: false
  statusbar.widgets:
    global:
    - keypress
    - url
    - scroll
    - history
    - tabs
    - progress
  url.searchengines:
    global:
      DEFAULT: https://search.disroot.org/?q={}
  url.start_pages:
    global: ddg.gg
  window.transparent:
    global: false
  zoom.default:
    global: '110'
