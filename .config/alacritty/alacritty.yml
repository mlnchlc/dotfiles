# Font configuration (changes require restart)

import:
  - ~/.config/alacritty/catppuccin-latte.yml

font:
  # The normal (roman) font face to use.
  normal:
    family: Noto Mono
    # Style can be specified to pick a specific face.
    style: Regular

  # The bold font face
  bold:
    family: Noto Mono
    # Style can be specified to pick a specific face.
    #
    style: Bold

  # The italic font face
  italic:
    family: Noto Mono
    # Style can be specified to pick a specific face.
    style: Italic
  size: 13.0

window.opacity: 1.0
env:
  TERM: xterm-256color

window:
  dimesions:
    columns: 0
    lines:  0
  padding:
    x: 10
    y: 10
    dynamic_padding: false
    decorations: full

tabspace: 4

draw_bold_text_with_bright_colors: true

mouse:
  hide_when_typing: true
  
dynamic_title: true

